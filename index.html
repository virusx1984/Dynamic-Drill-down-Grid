<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Drill-down Grid</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom styles for nested tables */
        .clickable-row {
            cursor: pointer;
        }
        .clickable-row:hover {
            background-color: #f8f9fa;
        }
        .nested-row {
            background-color: #fcfcfc;
        }
        .level-indicator {
            display: inline-block;
            width: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2>Dynamic Drill-down Grid</h2>
    
    <div class="card mb-3">
        <div class="card-header">1. Upload JSON</div>
        <div class="card-body">
            <input type="file" id="fileInput" class="form-control" accept=".json">
        </div>
    </div>

    <div id="configSection" class="card mb-3 d-none">
        <div class="card-header">2. Configuration</div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">How many aggregation levels?</label>
                <select id="levelCount" class="form-select" style="width: 200px;">
                    <option value="1">1 Level</option>
                    <option value="2" selected>2 Levels</option>
                    <option value="3">3 Levels</option>
                </select>
            </div>

            <div id="groupColsContainer" class="mb-3 row"></div>

            <div class="mb-3">
                <label class="form-label">Select Aggregation Columns (Sum):</label>
                <div id="valueColsContainer" class="d-flex flex-wrap gap-3"></div>
            </div>

            <button id="btnGenerate" class="btn btn-primary">Generate Grid</button>
        </div>
    </div>

    <div id="resultSection" class="d-none">
        <h4>Result Grid</h4>
        <div class="table-responsive">
            <table class="table table-bordered table-hover" id="mainTable">
                <thead class="table-dark">
                    </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/jquery-3.6.0.min.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>

<script>
    // Global storage for raw data and headers
    let rawData = [];
    let headers = [];
    let config = {
        levels: [], // Stores column names for each level
        valueCols: []
    };

    // 1. Handle File Upload
    $('#fileInput').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                rawData = JSON.parse(event.target.result);
                if (rawData.length > 0) {
                    headers = Object.keys(rawData[0]);
                    initConfigurationUI();
                }
            } catch (err) {
                alert('Invalid JSON file');
                console.error(err);
            }
        };
        reader.readAsText(file);
    });

    // 2. Initialize Configuration UI
    function initConfigurationUI() {
        $('#configSection').removeClass('d-none');
        renderGroupSelectors();
        renderValueSelectors();
    }

    // Render Dropdowns for Levels based on selection
    $('#levelCount').on('change', renderGroupSelectors);

    function renderGroupSelectors() {
        const count = parseInt($('#levelCount').val());
        const container = $('#groupColsContainer');
        container.empty();

        for (let i = 1; i <= count; i++) {
            let html = `
                <div class="col-md-4 mb-2">
                    <label class="form-label">Level ${i} Column:</label>
                    <select class="form-select level-select" data-level="${i}">
                        <option value="">-- Select Column --</option>
                        ${headers.map(h => `<option value="${h}">${h}</option>`).join('')}
                    </select>
                    <div class="form-text text-muted">
                        ${i === 1 ? 'Base grouping.' : `Adds to Level ${i-1} grouping.`}
                    </div>
                </div>
            `;
            container.append(html);
        }
    }

    // Render Checkboxes for Value Columns
    function renderValueSelectors() {
        const container = $('#valueColsContainer');
        container.empty();
        headers.forEach(h => {
            let html = `
                <div class="form-check">
                    <input class="form-check-input val-col-check" type="checkbox" value="${h}" id="chk_${h}">
                    <label class="form-check-label" for="chk_${h}">${h}</label>
                </div>
            `;
            container.append(html);
        });
    }

    // 3. Generate Report
    $('#btnGenerate').on('click', function() {
        // Collect Config
        const lvlCount = parseInt($('#levelCount').val());
        config.levels = [];
        
        // Validate Level selections
        let valid = true;
        $('.level-select').each(function() {
            const val = $(this).val();
            if (!val) valid = false;
            config.levels.push(val);
        });

        config.valueCols = [];
        $('.val-col-check:checked').each(function() {
            config.valueCols.push($(this).val());
        });

        if (!valid || config.valueCols.length === 0) {
            alert('Please select columns for all levels and at least one value column.');
            return;
        }

        $('#resultSection').removeClass('d-none');
        renderRootTable();
    });

    // Helper: Clean and Parse Number
    function parseNum(val) {
        if (!val || val === '-') return 0;
        if (typeof val === 'number') return val;
        // Remove commas and parse
        return parseFloat(val.toString().replace(/,/g, '')) || 0;
    }

    // Helper: Aggregate Data
    function aggregateData(dataset, groupKeys, valueKeys) {
        const groups = {};
        
        dataset.forEach(row => {
            // Create a composite key for grouping
            const key = groupKeys.map(k => row[k]).join('|||');
            
            if (!groups[key]) {
                groups[key] = {
                    _key: key,
                    _count: 0,
                    _rawRows: []
                };
                // Initialize sums
                valueKeys.forEach(vk => groups[key][vk] = 0);
                // Store grouping col values for display
                groupKeys.forEach(gk => groups[key][gk] = row[gk]);
            }
            
            groups[key]._count++;
            groups[key]._rawRows.push(row);
            
            // Sum values
            valueKeys.forEach(vk => {
                groups[key][vk] += parseNum(row[vk]);
            });
        });

        return Object.values(groups);
    }

    // 4. Rendering Logic

    function renderRootTable() {
        const $thead = $('#mainTable thead');
        const $tbody = $('#mainTable tbody');
        $thead.empty();
        $tbody.empty();

        // Level 1 Grouping Columns
        const l1Col = config.levels[0];
        
        // Build Header
        let headerHtml = '<tr><th style="width:50px"></th>'; // Expand icon col
        headerHtml += `<th>${l1Col}</th>`; // Group Col
        config.valueCols.forEach(vc => headerHtml += `<th>${vc}</th>`);
        headerHtml += '</tr>';
        $thead.append(headerHtml);

        // Calculate Level 1 Data
        const l1Data = aggregateData(rawData, [l1Col], config.valueCols);

        // Render Rows
        l1Data.forEach((row, index) => {
            const rowId = `l1_${index}`;
            let tr = `
                <tr class="clickable-row" data-id="${rowId}" data-level="1" data-key="${row[l1Col]}">
                    <td><span class="level-indicator">+</span></td>
                    <td><b>${row[l1Col]}</b></td>
                    ${config.valueCols.map(vc => `<td>${row[vc].toLocaleString()}</td>`).join('')}
                </tr>
                <tr id="child_${rowId}" class="d-none nested-row">
                    <td colspan="${2 + config.valueCols.length}" class="p-3">
                        <div id="container_${rowId}"></div>
                    </td>
                </tr>
            `;
            $tbody.append(tr);
        });

        bindClickEvents();
    }

    function bindClickEvents() {
        // Unbind previous to prevent duplicates
        $('.clickable-row').off('click').on('click', function() {
            const $row = $(this);
            const level = parseInt($row.data('level'));
            const rowId = $row.data('id');
            const $childRow = $(`#child_${rowId}`);
            const $icon = $row.find('.level-indicator');

            // Toggle visibility
            if (!$childRow.hasClass('d-none')) {
                $childRow.addClass('d-none');
                $icon.text('+');
                return;
            }

            $icon.text('-');
            $childRow.removeClass('d-none');
            const $container = $(`#container_${rowId}`);

            // If already rendered, just show
            if ($container.children().length > 0) return;

            // Render next level
            if (level < config.levels.length) {
                renderNextLevel($container, $row.data('key'), level);
            } else {
                // This was the last grouping level, show details
                const filters = getFiltersFromRow($row);
                renderDetailTable($container, filters);
            }
        });
    }

    // Helper to get all parent keys
    function getFiltersFromRow($row) {
        const filters = {};
        const currentLevel = parseInt($row.data('level'));
        
        // Add current row's key
        const colName = config.levels[currentLevel - 1];
        filters[colName] = $row.data('key');

        // Traverse up DOM to find parent rows
        let $parentRow = $row.closest('table').closest('tr').prev('.clickable-row');
        while ($parentRow.length) {
             const pLevel = parseInt($parentRow.data('level'));
             const pCol = config.levels[pLevel - 1];
             filters[pCol] = $parentRow.data('key');
             // Move up
             $parentRow = $parentRow.closest('table').closest('tr').prev('.clickable-row');
        }
        return filters;
    }

    function renderNextLevel($container, parentKey, parentLevelIdx) {
        const currentLevelIdx = parentLevelIdx + 1;
        const parentCol = config.levels[parentLevelIdx - 1];
        
        // Filter data by parent key
        const filteredData = rawData.filter(d => d[parentCol] == parentKey);
        
        const targetCol = config.levels[currentLevelIdx - 1];
        
        // Group by Level n column
        const aggData = aggregateData(filteredData, [targetCol], config.valueCols);

        let html = `<table class="table table-sm table-bordered mb-0" style="background: white;">`;
        
        // Header
        html += `<thead class="table-light"><tr><th style="width:40px"></th><th>${targetCol}</th>`;
        config.valueCols.forEach(vc => html += `<th>${vc}</th>`);
        html += `</tr></thead><tbody>`;

        aggData.forEach((row, i) => {
            const uniqueId = `l${currentLevelIdx}_${parentKey.replace(/[\s\W]/g,'')}_${i}`;
            html += `
                <tr class="clickable-row" data-id="${uniqueId}" data-level="${currentLevelIdx}" data-key="${row[targetCol]}">
                    <td><span class="level-indicator">+</span></td>
                    <td>${row[targetCol]}</td>
                    ${config.valueCols.map(vc => `<td>${row[vc].toLocaleString()}</td>`).join('')}
                </tr>
                <tr id="child_${uniqueId}" class="d-none nested-row">
                    <td colspan="${2 + config.valueCols.length}" class="p-3">
                        <div id="container_${uniqueId}"></div>
                    </td>
                </tr>
            `;
        });
        html += `</tbody></table>`;
        
        $container.html(html);
        bindClickEvents();
    }

    function renderDetailTable($container, filters) {
        // Filter raw data strictly
        const details = rawData.filter(row => {
            for (let k in filters) {
                if (row[k] != filters[k]) return false;
            }
            return true;
        });

        let html = `<h6>Details (${details.length} records)</h6>`;
        html += `<table class="table table-striped table-sm text-muted" style="font-size:0.9em"><thead><tr>`;
        
        headers.forEach(h => html += `<th>${h}</th>`);
        html += `</tr></thead><tbody>`;

        details.forEach(row => {
            html += `<tr>`;
            headers.forEach(h => html += `<td>${row[h]}</td>`);
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        $container.html(html);
    }
</script>

</body>
</html>
