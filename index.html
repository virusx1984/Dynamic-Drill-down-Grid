<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Drill-down Grid</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- Custom Scrollbar --- */
        .table-container {
            max-height: 75vh;
            overflow: auto;
            position: relative;
            border: 1px solid #dee2e6;
            scrollbar-width: thin;
            scrollbar-color: #adb5bd #f1f1f1;
        }

        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: #adb5bd;
            border-radius: 4px;
        }

        .table-container::-webkit-scrollbar-thumb:hover {
            background: #6c757d;
        }

        /* --- Table Layout --- */
        #mainTable {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            margin-bottom: 0;
            font-size: 0.9rem;
        }

        /* --- Borders & No Wrap --- */
        #mainTable th,
        #mainTable td {
            white-space: nowrap;
            padding: 0.3rem 0.5rem;
            vertical-align: middle;
            border: 1px solid #dee2e6 !important;
            border-top: none !important;
            border-left: none !important;
        }

        #mainTable thead th {
            border-top: 1px solid #dee2e6 !important;
        }

        #mainTable tbody td:first-child,
        #mainTable thead th:first-child {
            border-left: 1px solid #dee2e6 !important;
        }

        /* --- Sticky Logic --- */
        #mainTable thead th {
            position: sticky;
            top: 0;
            /* bg-color set by JS */
            color: white;
            z-index: 20;
            cursor: pointer;
            user-select: none;
            box-shadow: none !important;
            transition: filter 0.2s;
        }

        #mainTable thead th:hover {
            filter: brightness(1.2);
        }

        .sticky-col {
            position: sticky;
            z-index: 10;
            background-color: #f8f9fa;
            box-shadow: none !important;
        }

        /* Intersection handling */
        thead th.sticky-col {
            z-index: 30 !important;
            color: white;
        }

        tfoot th.sticky-col,
        tfoot td.sticky-col {
            z-index: 30 !important;
            background-color: #e9ecef;
            bottom: 0;
        }

        /* Row Hover */
        .clickable-row {
            cursor: pointer;
        }

        .clickable-row:hover td {
            background-color: #e2e6ea;
        }

        .clickable-row:hover td.sticky-col {
            background-color: #dbe2e8;
        }

        .sort-icon {
            font-size: 0.8em;
            margin-left: 5px;
            color: rgba(255, 255, 255, 0.7);
        }

        .sort-active {
            color: #fff;
        }

        /* Metric Item Styles */
        .metric-item {
            min-width: 160px;
            background-color: #fff;
            border: 1px solid #dee2e6;
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* Color Select Styling */
        .color-select {
            width: 20px;
            height: 20px;
            padding: 0;
            border: none;
            cursor: pointer;
            appearance: none;
            border-radius: 50%;
        }

        /* Batch Color Picker Style */
        #batchColorSelect option {
            color: white;
        }

        /* Total Row */
        tfoot {
            position: sticky;
            bottom: 0;
            background-color: #e9ecef;
            font-weight: bold;
            z-index: 15;
            box-shadow: none !important;
            border-top: 2px solid #adb5bd !important;
        }

        .drop-zone {
            border: 2px dashed #dee2e6;
            border-radius: 5px;
            padding: 2rem;
            text-align: center;
            transition: all 0.2s ease;
            background-color: #f8f9fa;
            cursor: pointer;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #0d6efd;
            background-color: #e9ecef;
        }

        .drop-zone p {
            pointer-events: none;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container-fluid my-4 bg-white p-4 shadow-sm rounded" style="width: 95%; margin: 0 auto;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">Dynamic Drill-down Grid</h3>
            <button id="btnReset" class="btn btn-outline-secondary btn-sm d-none">Reset All</button>
        </div>

        <div id="uploadSection" class="card mb-4">
            <div class="card-header bg-primary text-white">1. Upload Ultra Compact JSON</div>
            <div class="card-body">
                <div id="dropZone" class="drop-zone">
                    <div class="mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor"
                            class="bi bi-cloud-arrow-up text-primary" viewBox="0 0 16 16">
                            <path fill-rule="evenodd"
                                d="M7.646 5.146a.5.5 0 0 1 .708 0l2 2a.5.5 0 0 1-.708.708L8.5 6.707V10.5a.5.5 0 0 1-1 0V6.707L6.354 7.854a.5.5 0 1 1-.708-.708l2-2z" />
                            <path
                                d="M4.406 3.342A5.53 5.53 0 0 1 8 2c2.69 0 4.923 2 5.166 4.579C14.758 6.804 16 8.137 16 9.773 16 11.569 14.502 13 12.687 13H3.781C1.708 13 0 11.366 0 9.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383zm.653.757c-.757.653-1.153 1.44-1.153 2.056v.448l-.445.049C2.064 6.805 1 7.952 1 9.318 1 10.785 2.23 12 3.781 12h8.906C13.98 12 15 10.988 15 9.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 4.825 10.328 3 8 3a4.53 4.53 0 0 0-2.941 1.1z" />
                        </svg>
                    </div>
                    <p class="mb-2 text-muted">Drag & Drop JSON file here or click to browse</p>
                    <p class="small text-secondary mb-0">Required: <code>"columns"</code>, <code>"col_types"</code>,
                        <code>"data"</code></p>
                    <input type="file" id="fileInput" class="d-none" accept=".json">
                </div>
            </div>
        </div>

        <div id="configSection" class="card mb-4 d-none">
            <div class="card-header bg-secondary text-white">2. Configuration</div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold d-block">How many aggregation levels?</label>
                        <div class="btn-group w-100" role="group" aria-label="Level Count selection">
                            <input type="radio" class="btn-check" name="levelCount" id="level1" value="1"
                                autocomplete="off">
                            <label class="btn btn-outline-primary" for="level1">1 Level</label>

                            <input type="radio" class="btn-check" name="levelCount" id="level2" value="2"
                                autocomplete="off" checked>
                            <label class="btn btn-outline-primary" for="level2">2 Levels</label>

                            <input type="radio" class="btn-check" name="levelCount" id="level3" value="3"
                                autocomplete="off">
                            <label class="btn btn-outline-primary" for="level3">3 Levels</label>
                        </div>
                    </div>
                </div>

                <div id="groupColsContainer" class="row mb-4 p-3 bg-light border rounded mx-1"></div>

                <div class="mb-3">
                    <div class="row align-items-end mb-2">
                        <div class="col-md-5">
                            <label class="form-label fw-bold mb-1">Select Metric Columns (Sum) & Colors:</label>
                            <div class="text-muted small mb-2">Only 'aggregation' type columns are shown here.</div>
                            <input type="text" id="metricFilter" class="form-control form-control-sm"
                                placeholder="Filter columns (Text or Regex supported)...">
                        </div>

                        <div class="col-md-7 text-end">
                            <div class="d-flex justify-content-end align-items-center gap-2">
                                <div class="input-group input-group-sm w-auto">
                                    <select class="form-select" id="batchColorSelect"
                                        style="max-width: 100px; background-color: #212529; color: white;">
                                    </select>
                                    <button class="btn btn-outline-secondary" type="button" id="btnBatchColor">Set
                                        Color</button>
                                </div>

                                <div class="vr"></div>

                                <button type="button" class="btn btn-sm btn-outline-primary" id="btnSelectAll">Select
                                    Visible</button>
                                <button type="button" class="btn btn-sm btn-outline-secondary"
                                    id="btnUnselectAll">Unselect Visible</button>
                            </div>
                        </div>
                    </div>

                    <div id="valueColsContainer" class="d-flex flex-wrap gap-2 border p-3 rounded"
                        style="max-height: 300px; overflow-y: auto;"></div>
                </div>
                <button id="btnGenerate" class="btn btn-primary w-100 btn-lg">Load Grid</button>
            </div>
        </div>

        <div id="resultSection" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0 bg-light p-2 rounded border" id="breadcrumbList">
                        <li class="breadcrumb-item active">Home</li>
                    </ol>
                </nav>
                <button id="btnBackToConfig" class="btn btn-outline-secondary btn-sm">
                    &lt; Back to Configuration
                </button>
            </div>

            <div class="table-container">
                <table class="table table-sm mb-0" id="mainTable">
                    <thead></thead>
                    <tbody></tbody>
                    <tfoot></tfoot>
                </table>
            </div>
            <div class="mt-2 text-muted small">
                Tip: Click headers to sort. Click rows to drill down.
            </div>
        </div>
    </div>

    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>

    <script>
        // --- Global State ---
        let rawData = [];
        let headers = [];
        let colMap = {};
        let columnTypes = {};
        let config = {
            levels: [],
            valueCols: [],
            columnColors: {}
        };
        let currentLevel = 0;
        let filterStack = [];
        let currentTableData = [];
        let sortState = { col: null, dir: 'asc' };

        // Predefined colors
        const PREDEFINED_COLORS = [
            { name: 'Black', val: '#212529' },
            { name: 'Blue', val: '#0d6efd' },
            { name: 'Green', val: '#198754' },
            { name: 'Red', val: '#dc3545' },
            { name: 'Orange', val: '#fd7e14' },
            { name: 'Purple', val: '#6f42c1' }
        ];

        // --- 1. File Processing ---

        $('#dropZone').on('click', function () { $('#fileInput').click(); });

        const dropZone = document.getElementById('dropZone');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => $('#dropZone').addClass('dragover'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => $('#dropZone').removeClass('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0) processFile(files[0]);
        }, false);

        $('#fileInput').on('change', function (e) {
            if (e.target.files[0]) processFile(e.target.files[0]);
        });

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = function (event) {
                try {
                    const json = JSON.parse(event.target.result);

                    if (json.columns && Array.isArray(json.columns) &&
                        json.col_types && Array.isArray(json.col_types) &&
                        json.data && Array.isArray(json.data)) {

                        if (json.columns.length !== json.col_types.length) {
                            alert('Error: "columns" and "col_types" length mismatch.');
                            return;
                        }

                        headers = json.columns;
                        rawData = json.data;
                        colMap = {};
                        headers.forEach((h, i) => colMap[h] = i);

                        columnTypes = {};
                        json.col_types.forEach((type, i) => {
                            columnTypes[headers[i]] = type;
                        });

                        initConfigurationUI();
                        $('#uploadSection').addClass('d-none');
                        $('#btnReset').removeClass('d-none');
                    } else {
                        alert('Invalid JSON Format! Must contain "columns", "col_types", and "data" arrays.');
                    }
                } catch (err) {
                    console.error(err);
                    alert('Invalid JSON file.');
                }
            };
            reader.readAsText(file);
        }

        // --- 2. Configuration UI ---

        $('#btnReset').click(() => location.reload());

        $('#btnBackToConfig').click(function () {
            $('#resultSection').addClass('d-none');
            $('#configSection').removeClass('d-none');
        });

        function initConfigurationUI() {
            $('#configSection').removeClass('d-none');
            renderGroupSelectors();
            renderValueSelectors();
            initBatchColorPicker();
        }

        // CHANGED: Listen to Radio Button change instead of Select change
        $(document).on('change', 'input[name="levelCount"]', renderGroupSelectors);

        function initBatchColorPicker() {
            const $select = $('#batchColorSelect');
            $select.empty();
            PREDEFINED_COLORS.forEach(c => {
                $select.append(`<option value="${c.val}" style="background-color:${c.val};">${c.name}</option>`);
            });

            $select.on('change', function () {
                $(this).css('background-color', $(this).val());
            });
        }

        function renderGroupSelectors() {
            // CHANGED: Get value from Checked Radio Button
            const count = parseInt($('input[name="levelCount"]:checked').val());
            const container = $('#groupColsContainer');
            container.empty();
            const categoryCols = headers.filter(h => columnTypes[h] === 'category');

            for (let i = 1; i <= count; i++) {
                container.append(`
                <div class="col-md-4 mb-3">
                    <label class="form-label text-primary">Level ${i} Group By:</label>
                    <select class="form-select level-select">
                        <option value="">-- Choose Category --</option>
                        ${categoryCols.map(h => `<option value="${h}">${h}</option>`).join('')}
                    </select>
                </div>
            `);
            }
        }

        function renderValueSelectors() {
            const container = $('#valueColsContainer');
            container.empty();
            const aggCols = headers.filter(h => columnTypes[h] === 'aggregation');

            aggCols.forEach(h => {
                let colorOptions = PREDEFINED_COLORS.map(c =>
                    `<option value="${c.val}" style="background-color:${c.val}; color:white;">${c.name}</option>`
                ).join('');

                container.append(`
                <div class="metric-item d-flex align-items-center">
                    <div class="form-check mb-0 me-2">
                        <input class="form-check-input val-col-check" type="checkbox" value="${h}" id="chk_${h}" checked>
                    </div>
                    <select class="form-select form-select-sm p-0 ps-1 me-2 color-select" title="Header Color" 
                            style="width: 24px; height: 24px; background-color: #212529; color: transparent;"
                            onchange="this.style.backgroundColor=this.value">
                        ${colorOptions}
                    </select>
                    <label class="form-check-label text-truncate" for="chk_${h}" title="${h}">${h}</label>
                </div>
            `);
            });

            bindMetricFilterEvents();
        }

        function bindMetricFilterEvents() {
            $('#metricFilter').off('input').on('input', function () {
                const val = $(this).val().trim();
                let regex = null;
                if (val) {
                    try { regex = new RegExp(val, 'i'); } catch (e) { regex = null; }
                }

                $('.metric-item').each(function () {
                    const label = $(this).find('label').text();
                    let isMatch = true;
                    if (val) {
                        if (regex) isMatch = regex.test(label);
                        else isMatch = label.toLowerCase().includes(val.toLowerCase());
                    }
                    if (isMatch) $(this).removeClass('d-none').addClass('d-flex');
                    else $(this).addClass('d-none').removeClass('d-flex');
                });
            });

            // Select All Visible
            $('#btnSelectAll').off('click').on('click', function () {
                $('.metric-item.d-flex .val-col-check:not(:disabled)').prop('checked', true);
            });

            // Unselect All Visible
            $('#btnUnselectAll').off('click').on('click', function () {
                $('.metric-item.d-flex .val-col-check:not(:disabled)').prop('checked', false);
            });

            // Batch Set Color
            $('#btnBatchColor').off('click').on('click', function () {
                const selectedColor = $('#batchColorSelect').val();
                // Iterate over Visible AND Checked items
                $('.metric-item.d-flex').each(function () {
                    const $item = $(this).closest('.metric-item');
                    const $colorSelect = $item.find('.color-select');
                    $colorSelect.val(selectedColor);
                    $colorSelect.css('background-color', selectedColor);
                });
            });
        }

        // --- 3. Grid Generation ---
        $('#btnGenerate').on('click', function () {
            config.levels = [];
            $('.level-select').each(function () { if ($(this).val()) config.levels.push($(this).val()); });

            config.valueCols = [];
            config.columnColors = {};

            $('.val-col-check:checked').each(function () {
                const colName = $(this).val();
                config.valueCols.push(colName);

                const colorVal = $(this).closest('.metric-item').find('.color-select').val();
                config.columnColors[colName] = colorVal;
            });

            if (config.levels.length === 0 || config.valueCols.length === 0) {
                alert('Please select levels and metric columns.');
                return;
            }

            filterStack = [];
            currentLevel = 0;

            $('#configSection').addClass('d-none');
            $('#resultSection').removeClass('d-none');
            loadLevelView(0);
        });

        function loadLevelView(levelIndex) {
            currentLevel = levelIndex;
            sortState = { col: null, dir: 'asc' };

            let filteredData = rawData;
            filterStack.forEach(f => {
                const idx = colMap[f.col];
                filteredData = filteredData.filter(row => row[idx] == f.val);
            });

            if (currentLevel < config.levels.length) {
                const groupCol = config.levels[currentLevel];
                currentTableData = aggregateData(filteredData, groupCol);
                renderTable(currentTableData, groupCol, false);
            } else {
                currentTableData = filteredData;
                renderTable(currentTableData, null, true);
            }
            updateBreadcrumbs();
        }

        function aggregateData(dataset, groupKey) {
            const groups = {};
            const groupIdx = colMap[groupKey];

            dataset.forEach(row => {
                const val = row[groupIdx];
                if (!groups[val]) {
                    groups[val] = { [groupKey]: val };
                    config.valueCols.forEach(vc => groups[val][vc] = 0);
                }
                config.valueCols.forEach(vc => {
                    const colIdx = colMap[vc];
                    groups[val][vc] += parseNum(row[colIdx]);
                });
            });
            return Object.values(groups);
        }

        function parseNum(val) {
            if (!val || val === '-') return 0;
            if (typeof val === 'number') return val;
            return parseFloat(val.toString().replace(/,/g, '')) || 0;
        }

        function renderTable(data, groupCol, isDetail) {
            const $thead = $('#mainTable thead');
            const $tbody = $('#mainTable tbody');
            const $tfoot = $('#mainTable tfoot');

            $thead.empty();
            $tbody.empty();
            $tfoot.empty();

            let displayCols = [];
            if (isDetail) {
                const categoryCols = headers.filter(h => columnTypes[h] === 'category');
                displayCols = [...categoryCols, ...config.valueCols];
            } else {
                displayCols = [groupCol, ...config.valueCols];
            }

            let stickyColIndices = [];
            if (isDetail) {
                displayCols.forEach((col, idx) => {
                    if (!config.valueCols.includes(col)) stickyColIndices.push(idx);
                });
            } else {
                stickyColIndices.push(0);
            }

            // Render Header
            let headHtml = '<tr>';
            displayCols.forEach((col, idx) => {
                const isSticky = stickyColIndices.includes(idx);
                const isValue = config.valueCols.includes(col);
                const stickyClass = isSticky ? 'sticky-col' : '';
                const alignClass = isValue ? 'text-end' : 'text-start';

                let bgStyle = '';
                if (isValue && config.columnColors[col]) {
                    bgStyle = `background-color: ${config.columnColors[col]} !important;`;
                } else {
                    bgStyle = `background-color: #212529 !important;`;
                }

                headHtml += `<th class="${stickyClass} ${alignClass}" style="${bgStyle}" data-idx="${idx}" data-col="${col}">${col} <span class="sort-icon">⇅</span></th>`;
            });
            headHtml += '</tr>';
            $thead.html(headHtml);

            // Render Body
            data.forEach(row => {
                let tr = `<tr class="${!isDetail ? 'clickable-row' : ''}">`;
                displayCols.forEach((col, idx) => {
                    const isSticky = stickyColIndices.includes(idx);
                    const isValue = config.valueCols.includes(col);
                    const stickyClass = isSticky ? 'sticky-col' : '';
                    const alignClass = isValue ? 'text-end' : 'text-start';

                    let val;
                    if (isDetail) val = row[colMap[col]];
                    else val = row[col];

                    if (isValue) val = parseNum(val).toLocaleString();

                    tr += `<td class="${stickyClass} ${alignClass}" data-idx="${idx}">${val === undefined || val === null ? '-' : val}</td>`;
                });
                tr += '</tr>';
                const $tr = $(tr);

                if (!isDetail) {
                    $tr.click(function () {
                        const groupVal = row[displayCols[0]];
                        filterStack.push({ col: displayCols[0], val: groupVal });
                        loadLevelView(currentLevel + 1);
                    });
                }
                $tbody.append($tr);
            });

            // Totals
            let totals = {};
            config.valueCols.forEach(c => totals[c] = 0);
            data.forEach(row => {
                config.valueCols.forEach(c => {
                    let val;
                    if (isDetail) val = row[colMap[c]];
                    else val = row[c];
                    totals[c] += parseNum(val);
                });
            });

            let footHtml = '<tr>';
            displayCols.forEach((col, idx) => {
                const isSticky = stickyColIndices.includes(idx);
                const isValue = config.valueCols.includes(col);
                const stickyClass = isSticky ? 'sticky-col' : '';
                const alignClass = isValue ? 'text-end' : 'text-start';

                if (idx === 0) {
                    footHtml += `<td class="${stickyClass}" data-idx="${idx}">TOTAL</td>`;
                } else if (isValue) {
                    footHtml += `<td class="${stickyClass} ${alignClass}" data-idx="${idx}">${totals[col].toLocaleString()}</td>`;
                } else {
                    footHtml += `<td class="${stickyClass}" data-idx="${idx}"></td>`;
                }
            });
            footHtml += '</tr>';
            $tfoot.html(footHtml);

            let currentLeft = 0;
            $thead.find('th').each(function (index) {
                if ($(this).hasClass('sticky-col')) {
                    const width = $(this).outerWidth();
                    $(`#mainTable th[data-idx="${index}"], #mainTable td[data-idx="${index}"]`).css('left', currentLeft + 'px');
                    currentLeft += width;
                }
            });

            $thead.find('th').click(function () {
                const col = $(this).data('col');
                handleSort(col, displayCols, isDetail);
            });
        }

        function handleSort(col, displayCols, isDetail) {
            if (sortState.col === col) {
                sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
            } else {
                sortState.col = col;
                sortState.dir = 'asc';
            }

            $('th .sort-icon').text('⇅').removeClass('sort-active');
            const arrow = sortState.dir === 'asc' ? '↑' : '↓';
            $(`th[data-col="${col}"] .sort-icon`).text(arrow).addClass('sort-active');

            currentTableData.sort((a, b) => {
                let valA, valB;
                if (isDetail) {
                    valA = a[colMap[col]];
                    valB = b[colMap[col]];
                } else {
                    valA = a[col];
                    valB = b[col];
                }

                let numA = parseNum(valA);
                let numB = parseNum(valB);

                let isNum = !isNaN(parseFloat(valA)) && !isNaN(parseFloat(valB));
                if (config.valueCols.includes(col) || isNum) {
                    return sortState.dir === 'asc' ? numA - numB : numB - numA;
                } else {
                    valA = valA ? valA.toString().toLowerCase() : '';
                    valB = valB ? valB.toString().toLowerCase() : '';
                    if (valA < valB) return sortState.dir === 'asc' ? -1 : 1;
                    if (valA > valB) return sortState.dir === 'asc' ? 1 : -1;
                    return 0;
                }
            });

            let groupCol = null;
            if (!isDetail) groupCol = config.levels[currentLevel];
            renderTable(currentTableData, groupCol, isDetail);
        }

        function updateBreadcrumbs() {
            const $ul = $('#breadcrumbList');
            $ul.empty();
            $ul.append(`<li class="breadcrumb-item"><a href="#" onclick="resetToRoot()">Home</a></li>`);
            filterStack.forEach((filter, idx) => {
                $ul.append(`<li class="breadcrumb-item"><a href="#" onclick="rollbackTo(${idx})">${filter.val}</a></li>`);
            });
            let label = "Level " + (currentLevel + 1);
            if (currentLevel >= config.levels.length) label = "Details";
            $ul.append(`<li class="breadcrumb-item active">${label}</li>`);
        }

        window.resetToRoot = function () { filterStack = []; loadLevelView(0); };
        window.rollbackTo = function (stackIndex) {
            filterStack = filterStack.slice(0, stackIndex + 1);
            loadLevelView(stackIndex + 1);
        };
    </script>
</body>

</html>
