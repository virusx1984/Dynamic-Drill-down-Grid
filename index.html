<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Drill-down Grid</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- Layout & Scroll --- */
        .table-container {
            max-height: 75vh;
            /* Slightly reduced for better fit */
            overflow: auto;
            position: relative;
            border: 1px solid #dee2e6;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #mainTable {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            margin-bottom: 0;
        }

        /* --- Sticky Header (Top) --- */
        #mainTable thead th {
            position: sticky;
            top: 0;
            background-color: #212529;
            /* Dark header */
            color: white;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            padding: 12px 8px;
            white-space: nowrap;
        }

        #mainTable thead th:hover {
            background-color: #343a40;
        }

        /* --- Sticky First Column (Left) --- */
        #mainTable tbody td:first-child,
        #mainTable thead th:first-child {
            position: sticky;
            left: 0;
            z-index: 11;
            background-color: #f8f9fa;
            font-weight: bold;
            border-right: 2px solid #dee2e6;
            min-width: 120px;
            /* Ensure first column has decent width */
        }

        /* Top-Left Corner Intersection */
        #mainTable thead th:first-child {
            z-index: 20;
            background-color: #212529;
            color: white;
        }

        /* --- Row Styles --- */
        .clickable-row {
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .clickable-row:hover td {
            background-color: #e2e6ea;
        }

        .clickable-row:hover td:first-child {
            background-color: #dbe2e8;
        }

        /* Sort Icons */
        .sort-icon {
            font-size: 0.8em;
            margin-left: 5px;
            color: #adb5bd;
        }

        .sort-active {
            color: #fff;
        }

        /* Metric Checkbox Style */
        .metric-item {
            min-width: 120px;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container my-5 bg-white p-4 shadow-sm rounded">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">Dynamic Drill-down Grid</h3>
            <button id="btnReset" class="btn btn-outline-secondary btn-sm d-none">Reset Configuration</button>
        </div>

        <div id="uploadSection" class="card mb-4">
            <div class="card-header bg-primary text-white">1. Upload JSON Data</div>
            <div class="card-body">
                <input type="file" id="fileInput" class="form-control" accept=".json">
            </div>
        </div>

        <div id="configSection" class="card mb-4 d-none">
            <div class="card-header bg-secondary text-white">2. Configuration</div>
            <div class="card-body">

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">How many aggregation levels?</label>
                        <select id="levelCount" class="form-select">
                            <option value="1">1 Level</option>
                            <option value="2" selected>2 Levels</option>
                            <option value="3">3 Levels</option>
                        </select>
                    </div>
                </div>

                <div id="groupColsContainer" class="row mb-4 p-3 bg-light border rounded mx-1">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Select Metric Columns (Sum):</label>
                    <div class="text-muted small mb-2">Note: Grouping columns are automatically excluded.</div>
                    <div id="valueColsContainer" class="d-flex flex-wrap gap-3 border p-3 rounded">
                    </div>
                </div>

                <button id="btnGenerate" class="btn btn-primary w-100 btn-lg">Load Grid</button>
            </div>
        </div>

        <div id="resultSection" class="d-none">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb bg-light p-2 rounded border" id="breadcrumbList">
                    <li class="breadcrumb-item active">Home</li>
                </ol>
            </nav>

            <div class="table-container">
                <table class="table table-bordered table-hover mb-0" id="mainTable">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="mt-2 text-muted small">
                Tip: Click headers to sort. Click rows to drill down.
            </div>
        </div>
    </div>

    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>

    <script>
        // --- State Management ---
        let rawData = [];
        let headers = [];

        // Config State
        let config = {
            levels: [],
            valueCols: []
        };

        // View State
        let currentLevel = 0;
        let filterStack = [];
        let currentTableData = [];
        let sortState = { col: null, dir: 'asc' };

        // --- 1. Initialization & Upload ---
        $('#fileInput').on('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                try {
                    rawData = JSON.parse(event.target.result);
                    if (rawData.length > 0) {
                        headers = Object.keys(rawData[0]);
                        initConfigurationUI();
                        $('#uploadSection').addClass('d-none');
                    }
                } catch (err) {
                    alert('Invalid JSON');
                }
            };
            reader.readAsText(file);
        });

        $('#btnReset').click(() => location.reload());

        function initConfigurationUI() {
            $('#configSection').removeClass('d-none');
            renderGroupSelectors(); // Also triggers updateMetricAvailability
            renderValueSelectors();
        }

        // --- Logic for Interactivity ---

        $('#levelCount').on('change', renderGroupSelectors);

        // Watch for changes in Level dropdowns to update Metric checkboxes
        $(document).on('change', '.level-select', function () {
            updateMetricAvailability();
        });

        function renderGroupSelectors() {
            const count = parseInt($('#levelCount').val());
            const container = $('#groupColsContainer');
            container.empty();

            for (let i = 1; i <= count; i++) {
                let html = `
                <div class="col-md-4 mb-3">
                    <label class="form-label text-primary">Level ${i} Group By:</label>
                    <select class="form-select level-select">
                        <option value="">-- Choose Column --</option>
                        ${headers.map(h => `<option value="${h}">${h}</option>`).join('')}
                    </select>
                </div>
            `;
                container.append(html);
            }
            updateMetricAvailability();
        }

        function renderValueSelectors() {
            const container = $('#valueColsContainer');
            container.empty();
            headers.forEach(h => {
                // Check by default
                let html = `
                <div class="form-check metric-item">
                    <input class="form-check-input val-col-check" type="checkbox" value="${h}" id="chk_${h}" checked>
                    <label class="form-check-label" for="chk_${h}">${h}</label>
                </div>
            `;
                container.append(html);
            });
            updateMetricAvailability(); // Ensure consistency on init
        }

        // Core Logic: Sync Levels and Metrics
        function updateMetricAvailability() {
            // 1. Get all currently selected grouping columns
            const selectedGroups = [];
            $('.level-select').each(function () {
                const val = $(this).val();
                if (val) selectedGroups.push(val);
            });

            // 2. Iterate metric checkboxes
            $('.val-col-check').each(function () {
                const colName = $(this).val();
                const $chk = $(this);
                const $lbl = $chk.next('label');

                if (selectedGroups.includes(colName)) {
                    // If it is a group column: Uncheck and Disable
                    $chk.prop('checked', false);
                    $chk.prop('disabled', true);
                    $lbl.addClass('text-muted text-decoration-line-through');
                } else {
                    // Otherwise: Enable
                    $chk.prop('disabled', false);
                    $lbl.removeClass('text-muted text-decoration-line-through');

                    // Optional: If you want to strictly restore 'checked' state only if it was checked before,
                    // you need more complex state management. 
                    // Currently, we just enable it. The user can re-check it if needed.
                    // Or, if we want "Select All by Default" to mean "Always checked unless grouped":
                    // We can check it back if we want strict enforcement.
                    // Let's keep it simple: Enable it, but don't force check (unless it was default).
                    // But per your request "select metric columns unselect the column that are choosed", 
                    // this implies the reverse might be true. 
                    // I will leave it unchecked so user sees it was removed.
                }
            });
        }

        // --- 2. Generate Grid Logic ---
        $('#btnGenerate').on('click', function () {
            config.levels = [];
            $('.level-select').each(function () {
                if ($(this).val()) config.levels.push($(this).val());
            });

            config.valueCols = [];
            $('.val-col-check:checked').each(function () {
                config.valueCols.push($(this).val());
            });

            if (config.levels.length === 0 || config.valueCols.length === 0) {
                alert('Please select levels and metric columns.');
                return;
            }

            $('#configSection').addClass('d-none');
            $('#resultSection').removeClass('d-none');
            $('#btnReset').removeClass('d-none');

            loadLevelView(0);
        });

        // --- 3. Core Engine: Load Level ---
        function loadLevelView(levelIndex) {
            currentLevel = levelIndex;
            sortState = { col: null, dir: 'asc' };

            let filteredData = rawData;
            filterStack.forEach(f => {
                filteredData = filteredData.filter(row => row[f.col] == f.val);
            });

            if (currentLevel < config.levels.length) {
                const groupCol = config.levels[currentLevel];
                currentTableData = aggregateData(filteredData, groupCol);
                renderTable(currentTableData, groupCol, false);
            } else {
                currentTableData = filteredData;
                renderTable(currentTableData, null, true);
            }

            updateBreadcrumbs();
        }

        function aggregateData(dataset, groupKey) {
            const groups = {};
            dataset.forEach(row => {
                const val = row[groupKey];
                if (!groups[val]) {
                    groups[val] = { [groupKey]: val, _count: 0 };
                    config.valueCols.forEach(vc => groups[val][vc] = 0);
                }
                groups[val]._count++;
                config.valueCols.forEach(vc => {
                    groups[val][vc] += parseNum(row[vc]);
                });
            });
            return Object.values(groups);
        }

        function parseNum(val) {
            if (!val || val === '-') return 0;
            if (typeof val === 'number') return val;
            return parseFloat(val.toString().replace(/,/g, '')) || 0;
        }

        // --- 4. Render Table ---
        function renderTable(data, groupCol, isDetail) {
            const $thead = $('#mainTable thead');
            const $tbody = $('#mainTable tbody');
            $thead.empty();
            $tbody.empty();

            let displayCols = [];
            if (isDetail) {
                // In detail view, show grouping columns first for context, then remaining headers
                // Or just simple all headers
                displayCols = headers;
            } else {
                displayCols = [groupCol, ...config.valueCols];
            }

            let headHtml = '<tr>';
            displayCols.forEach(col => {
                headHtml += `<th data-col="${col}">${col} <span class="sort-icon">⇅</span></th>`;
            });
            headHtml += '</tr>';
            $thead.html(headHtml);

            renderTableBody(data, displayCols, isDetail);

            $thead.find('th').click(function () {
                const col = $(this).data('col');
                handleSort(col, displayCols, isDetail);
            });
        }

        function renderTableBody(data, displayCols, isDetail) {
            const $tbody = $('#mainTable tbody');
            $tbody.empty();

            data.forEach(row => {
                let tr = `<tr class="${!isDetail ? 'clickable-row' : ''}">`;

                displayCols.forEach((col, idx) => {
                    let val = row[col];
                    if (!isDetail && config.valueCols.includes(col)) {
                        val = val.toLocaleString();
                    }
                    tr += `<td>${val === undefined || val === null ? '-' : val}</td>`;
                });
                tr += '</tr>';

                const $tr = $(tr);

                if (!isDetail) {
                    $tr.click(function () {
                        const groupVal = row[displayCols[0]];
                        filterStack.push({ col: displayCols[0], val: groupVal });
                        loadLevelView(currentLevel + 1);
                    });
                }

                $tbody.append($tr);
            });
        }

        // --- 5. Sorting Logic ---
        function handleSort(col, displayCols, isDetail) {
            if (sortState.col === col) {
                sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
            } else {
                sortState.col = col;
                sortState.dir = 'asc';
            }

            $('th .sort-icon').text('⇅').removeClass('sort-active');
            const arrow = sortState.dir === 'asc' ? '↑' : '↓';
            $(`th[data-col="${col}"] .sort-icon`).text(arrow).addClass('sort-active');

            currentTableData.sort((a, b) => {
                let valA = a[col];
                let valB = b[col];
                let numA = parseNum(valA);
                let numB = parseNum(valB);

                let isNum = !isNaN(parseFloat(valA)) && !isNaN(parseFloat(valB));
                if (config.valueCols.includes(col) || isNum) {
                    return sortState.dir === 'asc' ? numA - numB : numB - numA;
                } else {
                    valA = valA ? valA.toString().toLowerCase() : '';
                    valB = valB ? valB.toString().toLowerCase() : '';
                    if (valA < valB) return sortState.dir === 'asc' ? -1 : 1;
                    if (valA > valB) return sortState.dir === 'asc' ? 1 : -1;
                    return 0;
                }
            });

            renderTableBody(currentTableData, displayCols, isDetail);
        }

        // --- 6. Breadcrumb Logic ---
        function updateBreadcrumbs() {
            const $ul = $('#breadcrumbList');
            $ul.empty();
            $ul.append(`<li class="breadcrumb-item"><a href="#" onclick="resetToRoot()">Home</a></li>`);
            filterStack.forEach((filter, idx) => {
                $ul.append(`
                <li class="breadcrumb-item">
                    <a href="#" onclick="rollbackTo(${idx})">${filter.val}</a>
                </li>
            `);
            });
            let label = "Level " + (currentLevel + 1);
            if (currentLevel >= config.levels.length) label = "Details";
            $ul.append(`<li class="breadcrumb-item active">${label}</li>`);
        }

        window.resetToRoot = function () {
            filterStack = [];
            loadLevelView(0);
        };

        window.rollbackTo = function (stackIndex) {
            filterStack = filterStack.slice(0, stackIndex + 1);
            loadLevelView(stackIndex + 1);
        };

    </script>

</body>

</html>
