<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Drill-down Grid</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container-fluid my-4 bg-white p-4 shadow-sm rounded" style="width: 95%; margin: 0 auto;">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">Dynamic Drill-down Grid</h3>
        <button id="btnReset" class="btn btn-outline-secondary btn-sm d-none">Reset All</button>
    </div>
    
    <div id="uploadSection" class="card mb-4">
        <div class="card-header bg-primary text-white">1. Upload Ultra Compact JSON</div>
        <div class="card-body">
            <div id="dropZone" class="drop-zone">
                <div class="mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-cloud-arrow-up text-primary" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M7.646 5.146a.5.5 0 0 1 .708 0l2 2a.5.5 0 0 1-.708.708L8.5 6.707V10.5a.5.5 0 0 1-1 0V6.707L6.354 7.854a.5.5 0 1 1-.708-.708l2-2z"/>
                        <path d="M4.406 3.342A5.53 5.53 0 0 1 8 2c2.69 0 4.923 2 5.166 4.579C14.758 6.804 16 8.137 16 9.773 16 11.569 14.502 13 12.687 13H3.781C1.708 13 0 11.366 0 9.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383zm.653.757c-.757.653-1.153 1.44-1.153 2.056v.448l-.445.049C2.064 6.805 1 7.952 1 9.318 1 10.785 2.23 12 3.781 12h8.906C13.98 12 15 10.988 15 9.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 4.825 10.328 3 8 3a4.53 4.53 0 0 0-2.941 1.1z"/>
                    </svg>
                </div>
                <p class="mb-2 text-muted">Drag & Drop JSON file here or click to browse</p>
                <p class="small text-secondary mb-0">Required: <code>"columns"</code>, <code>"col_types"</code>, <code>"data"</code></p>
                <input type="file" id="fileInput" class="d-none" accept=".json">
            </div>
        </div>
    </div>

    <div id="configSection" class="card mb-4 d-none">
        <div class="card-header bg-secondary text-white">2. Configuration</div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold d-block">How many aggregation levels?</label>
                    <div class="btn-group w-100" role="group" aria-label="Level Count selection">
                        <input type="radio" class="btn-check" name="levelCount" id="level1" value="1" autocomplete="off">
                        <label class="btn btn-outline-primary" for="level1">1 Level</label>

                        <input type="radio" class="btn-check" name="levelCount" id="level2" value="2" autocomplete="off" checked>
                        <label class="btn btn-outline-primary" for="level2">2 Levels</label>

                        <input type="radio" class="btn-check" name="levelCount" id="level3" value="3" autocomplete="off">
                        <label class="btn btn-outline-primary" for="level3">3 Levels</label>
                    </div>
                </div>
            </div>
            
            <div id="groupColsContainer" class="row mb-4 p-3 bg-light border rounded mx-1"></div>
            
            <div class="mb-3">
                <div class="row align-items-end mb-2">
                    <div class="col-md-5">
                        <label class="form-label fw-bold mb-1">Select Metric Columns (Sum) & Colors:</label>
                        <div class="text-muted small mb-2">Only 'aggregation' type columns are shown here.</div>
                        <input type="text" id="metricFilter" class="form-control form-control-sm" placeholder="Filter columns (Text or Regex supported)...">
                    </div>
                    
                    <div class="col-md-7 text-end">
                        <div class="d-flex justify-content-end align-items-center gap-2">
                            <div class="input-group input-group-sm w-auto">
                                <select class="form-select" id="batchColorSelect" style="max-width: 100px; background-color: #212529; color: white;">
                                    </select>
                                <button class="btn btn-outline-secondary" type="button" id="btnBatchColor">Set Color</button>
                            </div>
                            
                            <div class="vr"></div>
                            
                            <button type="button" class="btn btn-sm btn-outline-primary" id="btnSelectAll">Select Visible</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary" id="btnUnselectAll">Unselect Visible</button>
                        </div>
                    </div>
                </div>
                
                <div id="valueColsContainer" class="d-flex flex-wrap gap-2 border p-3 rounded" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
            <button id="btnGenerate" class="btn btn-primary w-100 btn-lg">Load Grid</button>
        </div>
    </div>

    <div id="resultSection" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 bg-light p-2 rounded border" id="breadcrumbList">
                    <li class="breadcrumb-item active">Home</li>
                </ol>
            </nav>
            <button id="btnBackToConfig" class="btn btn-outline-secondary btn-sm">
                &lt; Back to Configuration
            </button>
        </div>

        <div class="table-container">
            <table class="table table-sm mb-0" id="mainTable">
                <thead></thead>
                <tbody></tbody>
                <tfoot></tfoot>
            </table>
        </div>
        <div class="mt-2 text-muted small">
            Tip: Click headers to sort. Click rows to drill down.
        </div>
    </div>
</div>

<script src="js/jquery-3.6.0.min.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
